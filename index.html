    /* Basic page reset */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html,body { height: 100%; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; color:#222; background:#f7fafc; }

    /* Page grid */
    .page {
      display: grid;
      grid-template-columns: 240px 1fr 320px;
      grid-template-rows: auto 1fr auto;
      grid-template-areas:
        "header header header"
        "nav main aside"
        "footer footer footer";
      gap: 1.25rem;
      min-height: 100vh;
      padding: 1.25rem;
    }

    header {
      grid-area: header;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:1rem;
      background: linear-gradient(90deg,#0ea5a4, #06b6d4);
      color: white;
      padding: 1rem;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(3,7,18,0.08);

    header .brand { display:flex; align-items:center; gap:.75rem; }

    nav.primary {

      background: white;

      border-radius: 10px;
      box-shadow: 0 3px 8px rgba(3,7,18,0.06);

    nav.primary ul { list-style:none; display:flex; flex-direction:column; gap:.5rem; }

    nav.primary a:hover { background:#ecfeff; }
